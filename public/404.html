<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTIGDL — 404</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script>
    // GitHub Pages serwuje ten plik dla nieznanych adresów.
    // Wracamy na stronę główną projektu (np. /YTIGDL/), zachowując bazę ścieżki.
    (function () {
      var seg = location.pathname.split('/').filter(Boolean);
      var base = seg.length ? '/' + seg[0] + '/' : '/';
      if (location.pathname !== base) location.replace(location.origin + base);
    })();
  </script>
</head>
<body>
  <div class="bg-orbs"><span class="orb o1"></span><span class="orb o2"></span><span class="orb o3"></span></div>
  <div class="bg-grid"></div>
  <div class="center-card">
    <h2 style="font-size:2rem;margin-bottom:10px">404 — <span class="gradient">nie ma takiej strony</span></h2>
    <p style="color:var(--muted);margin-bottom:24px">Przekierowuję Cię na stronę główną…</p>
    <a class="btn btn-primary btn-block" href="/">Wróć na stronę główną</a>
  </div>
</body>
</html>
